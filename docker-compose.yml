services:
  db:
    image: postgres:16
    container_name: kelepir-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kelepir
      POSTGRES_PASSWORD: kelepir
      POSTGRES_DB: kelepir
    ports:
      - "5433:5432"
    volumes:
      - kelepir-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kelepir"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kelepir-pgdata:
